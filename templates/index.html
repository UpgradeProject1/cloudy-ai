<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>☁️ Cloudy AI</title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

    <!-- BACKGROUND -->

    <div class="sky"></div>

    <div id="stars"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <!-- MAIN -->

    <div class="container">

        <h1>☁️ Cloudy AI</h1>

        <p class="subtitle">
            Intelligence artificielle cosmique 🌌
        </p>

        <div id="chat-box"></div>

        <div class="input-area">

            <input
                type="text"
                id="user-input"
                placeholder="Parle à Cloudy..."
            >

            <button onclick="sendMessage()">
                Envoyer
            </button>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>
</html>
